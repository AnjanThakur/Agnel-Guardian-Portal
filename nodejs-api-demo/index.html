<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node.js JWT Auth Demo</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
        h2 { margin-top: 0; color: #333; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; color: white; background-color: #007bff; margin-bottom: 10px; font-weight: bold; }
        button.secondary { background-color: #28a745; }
        button:hover { opacity: 0.9; }
        .output { background: #2d2d2d; color: #b5e853; padding: 10px; font-family: monospace; border-radius: 4px; min-height: 50px; overflow-x: auto; font-size: 12px; margin-top: 15px;}
    </style>
</head>
<body>

<div class="container">
    <h2>REST API Demo</h2>
    
    <div>
        <input type="text" id="username" placeholder="Username (e.g. admin)" value="admin">
        <input type="password" id="password" placeholder="Password" value="password123">
        <button onclick="login()">1. Login (Get Token)</button>
    </div>
    
    <div>
        <button class="secondary" onclick="fetchData()">2. Fetch Protected Data</button>
    </div>

    <h4>Server Response:</h4>
    <div class="output" id="output">No actions yet...</div>
</div>

<script>
    let currentToken = null;

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const output = document.getElementById('output');
        
        output.innerHTML = "Authenticating...\n";

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            
            output.innerHTML = JSON.stringify(data, null, 2);
            
            if (data.token) {
                currentToken = data.token;
            }
        } catch (error) {
            output.innerHTML = "Error connecting to server.";
        }
    }

    async function fetchData() {
        const output = document.getElementById('output');
        
        if (!currentToken) {
            output.innerHTML = "Error: Please login first to get a token!";
            return;
        }

        output.innerHTML = "Requesting with Bearer token...\n";

        try {
            const res = await fetch('/api/protected-data', {
                method: 'GET',
                // This is where we securely send the JWT token!
                headers: { 'Authorization': `Bearer ${currentToken}` } 
            });
            const data = await res.json();
            
            output.innerHTML = JSON.stringify(data, null, 2);
        } catch (error) {
            output.innerHTML = "Error fetching data.";
        }
    }
</script>
</body>
</html>
